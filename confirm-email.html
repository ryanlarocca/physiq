<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Confirmed ✓ — Physiq</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .container {
      text-align: center;
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      max-width: 400px;
    }
    .checkmark {
      font-size: 60px;
      margin-bottom: 20px;
    }
    h1 {
      color: #333;
      margin: 0 0 10px;
      font-size: 28px;
    }
    p {
      color: #666;
      margin: 10px 0;
      line-height: 1.6;
    }
    .button {
      display: inline-block;
      margin-top: 30px;
      padding: 12px 32px;
      background: #667eea;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-weight: 600;
      transition: background 0.3s;
    }
    .button:hover {
      background: #5568d3;
    }
    .loading {
      display: none;
      margin-top: 20px;
      color: #667eea;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="checkmark">✓</div>
    <h1>Email Confirmed!</h1>
    <p>Your email has been verified. You're all set to use Physiq.</p>
    <p id="redirect-msg">Redirecting you to the app...</p>
    <a href="/physiq/" class="button">Go to Physiq</a>
    <div class="loading" id="loading">Redirecting in a moment...</div>
  </div>

  <script>
    // Auto-redirect to main app after 2 seconds
    setTimeout(() => {
      window.location.href = '/physiq/';
    }, 2000);
  </script>
</body>
</html>
